
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chapter 11 Quiz</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f7fb;text-align:center;margin:0}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:white;border-bottom:2px solid #ddd}
header img{height:50px}

.container{padding:30px}

button{display:block;margin:10px auto;padding:12px 20px;border:none;border-radius:8px;background:#2fa4e7;color:white;font-weight:bold}

.progress{margin-bottom:20px;font-weight:bold}
</style>

<script>

let questions=[
{q:"What does the root 'pan' mean?",a:"all",choices:["peace","all","hang","push"]},
{q:"Which root means peace?",a:"pac",choices:["pend","pac","pel","path"]},
{q:"Which root means feeling?",a:"path",choices:["pan","path","pend","pel"]},
{q:"Which root means push or drive?",a:"pel",choices:["pel","pan","pac","pend"]},
{q:"Which root means hang?",a:"pend",choices:["pend","path","pan","pac"]}
];

let index=0;
let score=0;

function load(){
document.getElementById("progress").innerText="Question "+(index+1)+" / "+questions.length;

let q=questions[index];
document.getElementById("question").innerText=q.q;

let choicesHTML="";
q.choices.sort(()=>Math.random()-0.5).forEach(c=>{
choicesHTML+=`<button onclick="answer('${c}')">${c}</button>`;
});
document.getElementById("choices").innerHTML=choicesHTML;
}

function answer(choice){
if(choice===questions[index].a) score++;

index++;

if(index>=questions.length){
document.querySelector(".container").innerHTML="<h2>Score: "+score+" / "+questions.length+"</h2>";
}
else{
load();
}
}

window.onload=load;

</script>

</head>

<body>

<header>
<button onclick="history.back()">⬅ Back</button>
<img src="../mascots/kitimus/kitimus-neutral.png">
<a href="https://kitimus.com/">Home</a>
</header>

<div class="container">
<div id="progress" class="progress"></div>
<h2 id="question"></h2>
<div id="choices"></div>
</div>

</body>
</html>
