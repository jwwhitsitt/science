<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Chapter 11</title>
<style>
  :root{
    --bg:#f6fbff;
    --card:#ffffff;
    --ink:#17324d;
    --muted:#5d748a;
    --line:#d8e6f2;
    --blue:#2fa4e7;
    --blue-dark:#1f7db4;
    --shadow:0 10px 28px rgba(25,64,99,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(180deg,#f6fbff 0%,#edf7ff 100%);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{width:min(980px,94vw);margin:0 auto;padding:20px 0 36px}
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
  }
  .topbar .left{justify-self:start}
  .topbar .center{justify-self:center}
  .topbar .right{justify-self:end}
  .nav-btn{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:96px;padding:12px 16px;border:none;border-radius:999px;
    background:var(--card);color:var(--ink);font-weight:700;font-size:16px;
    box-shadow:var(--shadow);cursor:pointer;text-decoration:none;
  }
  .kitimus{width:78px;height:78px;object-fit:contain;display:block}
  .hero,.card{
    background:var(--card);border:1px solid var(--line);border-radius:30px;
    box-shadow:var(--shadow);
  }
  .hero{padding:22px 20px;text-align:center;margin-bottom:18px}
  h1{margin:0 0 8px;font-size:clamp(28px,4vw,40px);line-height:1.1}
  .sub{margin:0;color:var(--muted);font-size:18px;line-height:1.5}
  .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  .card{padding:28px 20px;text-align:center;text-decoration:none;color:var(--ink)}
  .card h2{margin:0 0 8px;font-size:28px}
  .card p{margin:0;color:var(--muted);font-size:17px}
  @media (max-width:720px){
    .cards{grid-template-columns:1fr}
    .kitimus{width:66px;height:66px}
    .nav-btn{min-width:86px;padding:11px 14px;font-size:15px}
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="left"><button class="nav-btn" type="button" onclick="history.back()">← Back</button></div>
      <div class="center"><img class="kitimus" src="../mascots/kitimus/kitimus-neutral.png" alt="Kitimus" onerror="this.style.display='none'"></div>
      <div class="right"><a class="nav-btn" href="https://kitimus.com/">Home</a></div>
    </div>

    <section class="hero">
      <h1>Chapter 11</h1>
      <p class="sub">Choose a way to practice your root words.</p>
    </section>

    <section class="cards">
      <a class="card" href="vocab.html">
        <h2>📚 Vocabulary</h2>
        <p>Tap-to-reveal root practice</p>
      </a>
      <a class="card" href="quiz.html">
        <h2>📝 Quiz</h2>
        <p>Multiple choice practice</p>
      </a>
    </section>
  </main>
</body>
</html>
