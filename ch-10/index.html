<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Chapter 10 – Root Words</title>
  <style>
    :root{
      --bg:#f6fbff;
      --card:#ffffff;
      --ink:#17324d;
      --muted:#5d748a;
      --line:#d8e6f2;
      --blue:#2fa4e7;
      --blue-dark:#1f7db4;
      --green:#2faf9b;
      --green-dark:#238978;
      --yellow:#f7d76a;
      --shadow:0 10px 28px rgba(25,64,99,.12);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f6fbff 0%,#edf7ff 100%);
      color:var(--ink);
      min-height:100vh;
    }

    .wrap{
      width:min(980px,92vw);
      margin:0 auto;
      padding:20px 0 36px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .topbar .left{justify-self:start}
    .topbar .center{justify-self:center}
    .topbar .right{justify-self:end}

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:96px;
      padding:12px 16px;
      border:none;
      border-radius:999px;
      background:var(--card);
      color:var(--ink);
      font-weight:700;
      font-size:16px;
      box-shadow:var(--shadow);
      cursor:pointer;
      text-decoration:none;
    }

    .nav-btn:hover{transform:translateY(-1px)}

    .kitimus{
      width:78px;
      height:78px;
      object-fit:contain;
      display:block;
    }

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:28px 22px;
      text-align:center;
      margin-bottom:22px;
    }

    .eyebrow{
      display:inline-block;
      background:#e8f6ff;
      color:var(--blue-dark);
      font-size:14px;
      font-weight:800;
      border-radius:999px;
      padding:8px 12px;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.1;
    }

    .sub{
      margin:0 auto;
      max-width:700px;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
      text-decoration:none;
      color:inherit;
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:transform .14s ease, box-shadow .14s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 36px rgba(25,64,99,.16);
    }

    .icon{
      width:72px;
      height:72px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-size:34px;
      margin-bottom:16px;
    }

    .icon.vocab{background:#e8f6ff}
    .icon.quiz{background:#e8fbf7}

    .card h2{
      margin:0 0 8px;
      font-size:30px;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }

    .go{
      margin-top:16px;
      font-weight:800;
      color:var(--blue-dark);
      font-size:17px;
    }

    @media (max-width:720px){
      .cards{grid-template-columns:1fr}
      .nav-btn{min-width:86px;padding:11px 14px;font-size:15px}
      .kitimus{width:66px;height:66px}
      .hero{padding:24px 18px}
      .card{min-height:unset}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="left">
        <button class="nav-btn" type="button" onclick="history.back()">← Back</button>
      </div>
      <div class="center">
        <img class="kitimus" src="../mascots/kitimus/kitimus-neutral.png" alt="Kitimus" onerror="this.style.display='none'">
      </div>
      <div class="right">
        <a class="nav-btn" href="https://kitimus.com/">Home</a>
      </div>
    </div>

    <section class="hero">
      <div class="eyebrow">Science • Chapter 10</div>
      <h1>Root Word Practice</h1>
      <p class="sub">Practice Chapter 10 roots with tap-to-reveal cards and a multiple choice quiz.</p>
    </section>

    <section class="cards" aria-label="Chapter 10 study choices">
      <a class="card" href="vocab.html">
        <div>
          <div class="icon vocab">📚</div>
          <h2>Vocabulary</h2>
          <p>Tap-to-reveal root practice</p>
        </div>
        <div class="go">Open Vocabulary →</div>
      </a>

      <a class="card" href="quiz.html">
        <div>
          <div class="icon quiz">📝</div>
          <h2>Quiz</h2>
          <p>Multiple choice practice</p>
        </div>
        <div class="go">Start Quiz →</div>
      </a>
    </section>
  </main>
</body>
</html>
