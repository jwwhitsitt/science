<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Chapter 10 – Vocabulary</title>
  <style>
    :root{
      --bg:#f6fbff;
      --card:#ffffff;
      --ink:#17324d;
      --muted:#5d748a;
      --line:#d8e6f2;
      --blue:#2fa4e7;
      --blue-dark:#1f7db4;
      --green:#2faf9b;
      --yellow:#f7d76a;
      --shadow:0 10px 28px rgba(25,64,99,.12);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f6fbff 0%,#edf7ff 100%);
      color:var(--ink);
      min-height:100vh;
    }

    .wrap{
      width:min(1080px,94vw);
      margin:0 auto;
      padding:20px 0 36px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }
    .topbar .left{justify-self:start}
    .topbar .center{justify-self:center}
    .topbar .right{justify-self:end}

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:96px;
      padding:12px 16px;
      border:none;
      border-radius:999px;
      background:var(--card);
      color:var(--ink);
      font-weight:700;
      font-size:16px;
      box-shadow:var(--shadow);
      cursor:pointer;
      text-decoration:none;
    }

    .kitimus{width:78px;height:78px;object-fit:contain;display:block}

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:24px 20px;
      text-align:center;
      margin-bottom:18px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,40px);
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin:0 0 18px;
    }

    .count{
      font-size:16px;
      font-weight:700;
      color:var(--blue-dark);
      background:#e8f6ff;
      padding:10px 14px;
      border-radius:999px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .action-btn{
      border:none;
      border-radius:999px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:var(--shadow);
      background:var(--card);
      color:var(--ink);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-btn{
      width:100%;
      border:none;
      background:none;
      padding:20px;
      text-align:left;
      cursor:pointer;
      color:inherit;
    }

    .card-btn:hover .tap{
      color:var(--blue-dark);
    }

    .card-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .rootline{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .emoji{
      width:54px;
      height:54px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-size:28px;
      background:#eef8ff;
      flex:0 0 auto;
    }

    .root{
      font-size:28px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .tap{
      font-weight:800;
      color:var(--muted);
      white-space:nowrap;
    }

    .hint{
      color:var(--muted);
      font-size:17px;
      line-height:1.45;
      margin:0;
    }

    .details{
      border-top:1px dashed var(--line);
      padding:16px 20px 20px;
      display:none;
      background:#fcfeff;
    }

    .card.open .details{display:block}

    .meaning{
      font-size:20px;
      font-weight:900;
      margin:0 0 10px;
      color:var(--blue-dark);
    }

    .example{
      margin:10px 0 0;
      font-size:17px;
      line-height:1.5;
    }

    .example strong{color:var(--ink)}

    @media (max-width:780px){
      .cards{grid-template-columns:1fr}
      .toolbar{align-items:flex-start}
      .kitimus{width:66px;height:66px}
      .nav-btn{min-width:86px;padding:11px 14px;font-size:15px}
      .root{font-size:24px}
      .tap{font-size:14px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="left">
        <button class="nav-btn" type="button" onclick="history.back()">← Back</button>
      </div>
      <div class="center">
        <img class="kitimus" src="../mascots/kitimus/kitimus-neutral.png" alt="Kitimus" onerror="this.style.display='none'">
      </div>
      <div class="right">
        <a class="nav-btn" href="https://kitimus.com/">Home</a>
      </div>
    </div>

    <section class="hero">
      <h1>Chapter 10 Vocabulary</h1>
      <p class="sub">Tap a card to reveal the root, meaning, and example words.</p>
    </section>

    <div class="toolbar">
      <div class="count" id="countLine">6 cards</div>
      <div class="actions">
        <button class="action-btn" type="button" id="revealAllBtn">Reveal all</button>
        <button class="action-btn" type="button" id="hideAllBtn">Hide all</button>
        <button class="action-btn" type="button" id="shuffleBtn">Shuffle</button>
      </div>
    </div>

    <section class="cards" id="cards"></section>
  </main>

  <script>
    const cardData = [
      {
        emoji: '🐣',
        root: 'neo',
        meaning: 'new, recent',
        mainWord: 'neonatal',
        mainDef: 'having to do with a newborn baby',
        extraWord: 'Neolithic',
        extraDef: 'from a newer Stone Age time'
      },
      {
        emoji: '🌙',
        root: 'noct, nocti',
        meaning: 'night',
        mainWord: 'nocturnal',
        mainDef: 'active at night',
        extraWord: 'noctivagant',
        extraDef: 'moving around at night'
      },
      {
        emoji: '🚫',
        root: 'non',
        meaning: 'not',
        mainWord: 'nonfiction',
        mainDef: 'writing about real people or real events',
        extraWord: 'nonsense',
        extraDef: 'something that does not make sense'
      },
      {
        emoji: '🔷',
        root: 'oid',
        meaning: 'like, resembling, in shape or form',
        mainWord: 'asteroid',
        mainDef: 'a rocky space object that is star-like in appearance',
        extraWord: 'ovoid',
        extraDef: 'egg-shaped'
      },
      {
        emoji: '👁',
        root: 'opt',
        meaning: 'eye, having to do with eye',
        mainWord: 'optic',
        mainDef: 'having to do with sight or the eye',
        extraWord: 'optical',
        extraDef: 'related to seeing or light'
      },
      {
        emoji: '⚪',
        root: 'orb',
        meaning: 'circle',
        mainWord: 'orbit',
        mainDef: 'the path one object takes around another in space',
        extraWord: 'orb',
        extraDef: 'a round ball or sphere'
      },
      {
        emoji: '🦴',
        root: 'osis',
        meaning: 'bone',
        mainWord: 'osteoporosis',
        mainDef: 'a condition that makes bones weak',
        extraWord: 'ossify',
        extraDef: 'to turn into bone or become hard like bone'
      }
    ];

    const cardsEl = document.getElementById('cards');
    const countLine = document.getElementById('countLine');

    function updateCount(){
      countLine.textContent = `${cardData.length} cards`;
    }

    function renderCards(){
      cardsEl.innerHTML = '';
      cardData.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <button class="card-btn" type="button" aria-expanded="false">
            <div class="card-top">
              <div class="rootline">
                <div class="emoji">${item.emoji}</div>
                <div class="root">${item.root}</div>
              </div>
              <div class="tap">Tap to reveal</div>
            </div>
            <p class="hint">Practice this root word and its example words.</p>
          </button>
          <div class="details">
            <p class="meaning">${item.meaning}</p>
            <p class="example"><strong>${item.mainWord}</strong> — ${item.mainDef}</p>
            <p class="example"><strong>${item.extraWord}</strong> — ${item.extraDef}</p>
          </div>
        `;

        const btn = article.querySelector('.card-btn');
        btn.addEventListener('click', () => {
          const isOpen = article.classList.toggle('open');
          btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          article.querySelector('.tap').textContent = isOpen ? 'Tap to hide' : 'Tap to reveal';
        });

        cardsEl.appendChild(article);
      });
    }

    function setAll(open){
      document.querySelectorAll('.card').forEach(card => {
        const btn = card.querySelector('.card-btn');
        const tap = card.querySelector('.tap');
        card.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        tap.textContent = open ? 'Tap to hide' : 'Tap to reveal';
      });
    }

    function shuffle(array){
      for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    document.getElementById('revealAllBtn').addEventListener('click', () => setAll(true));
    document.getElementById('hideAllBtn').addEventListener('click', () => setAll(false));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      shuffle(cardData);
      renderCards();
    });

    updateCount();
    renderCards();
  </script>
</body>
</html>
