<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Chapter 12 – Quiz</title>
  <style>
    :root{
      --bg:#f6fbff;
      --card:#ffffff;
      --ink:#17324d;
      --muted:#5d748a;
      --line:#d8e6f2;
      --blue:#2fa4e7;
      --blue-dark:#1f7db4;
      --green:#2faf9b;
      --green-dark:#238978;
      --red:#e96a6a;
      --shadow:0 10px 28px rgba(25,64,99,.12);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f6fbff 0%,#edf7ff 100%);
      color:var(--ink);
      min-height:100vh;
    }
    .wrap{width:min(980px,94vw);margin:0 auto;padding:20px 0 36px}
    .topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:18px}
    .topbar .left{justify-self:start}
    .topbar .center{justify-self:center}
    .topbar .right{justify-self:end}
    .nav-btn{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:96px;padding:12px 16px;border:none;border-radius:999px;
      background:var(--card);color:var(--ink);font-weight:700;font-size:16px;
      box-shadow:var(--shadow);cursor:pointer;text-decoration:none;
    }
    .kitimus{width:78px;height:78px;object-fit:contain;display:block}
    .hero{
      background:var(--card);border:1px solid var(--line);border-radius:30px;
      box-shadow:var(--shadow);padding:22px 20px;text-align:center;margin-bottom:18px;
    }
    h1{margin:0 0 8px;font-size:clamp(28px,4vw,40px);line-height:1.1}
    .sub{margin:0;color:var(--muted);font-size:18px;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .stat{
      background:var(--card);border:1px solid var(--line);border-radius:22px;
      box-shadow:var(--shadow);padding:14px 16px;text-align:center;
    }
    .stat .label{color:var(--muted);font-size:14px;font-weight:700;margin-bottom:6px}
    .stat .value{font-size:26px;font-weight:900}
    .quiz-card{
      background:var(--card);border:1px solid var(--line);border-radius:30px;
      box-shadow:var(--shadow);padding:22px;
    }
    .question-type{
      display:inline-block;background:#e8f6ff;color:var(--blue-dark);
      border-radius:999px;padding:8px 12px;font-size:14px;font-weight:800;margin-bottom:12px;
    }
    .question{font-size:clamp(22px,3vw,32px);font-weight:900;line-height:1.25;margin:0 0 16px}
    .answers{display:grid;gap:12px;margin-bottom:16px}
    .answer-btn{
      width:100%;text-align:left;border:2px solid var(--line);border-radius:18px;
      background:#fff;color:var(--ink);padding:14px 16px;font-size:17px;font-weight:700;
      cursor:pointer;transition:transform .1s ease,border-color .1s ease;
    }
    .answer-btn:hover:not([disabled]){transform:translateY(-1px);border-color:#b8d8ee}
    .answer-btn.correct{border-color:var(--green);background:#eefcf8}
    .answer-btn.wrong{border-color:var(--red);background:#fff3f3}
    .answer-btn:disabled{cursor:default}
    .feedback{min-height:30px;font-size:18px;font-weight:800;margin-bottom:14px}
    .feedback.good{color:var(--green-dark)}
    .feedback.bad{color:#b94d4d}
    .next-row{display:flex;justify-content:flex-end}
    .next-btn,.restart-btn{
      border:none;border-radius:999px;padding:13px 18px;font-size:16px;
      font-weight:800;cursor:pointer;box-shadow:var(--shadow);background:var(--blue);color:#fff;
    }
    .next-btn[hidden],.restart-btn[hidden]{display:none}
    .done{text-align:center;padding:10px 0 4px}
    .done h2{margin:0 0 8px;font-size:34px}
    .done p{margin:0 0 14px;color:var(--muted);font-size:18px;line-height:1.5}
    @media (max-width:720px){
      .stats{grid-template-columns:1fr}
      .kitimus{width:66px;height:66px}
      .nav-btn{min-width:86px;padding:11px 14px;font-size:15px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="left"><button class="nav-btn" type="button" onclick="history.back()">← Back</button></div>
      <div class="center"><img class="kitimus" src="../mascots/kitimus/kitimus-neutral.png" alt="Kitimus" onerror="this.style.display='none'"></div>
      <div class="right"><a class="nav-btn" href="https://kitimus.com/">Home</a></div>
    </div>

    <section class="hero">
      <h1>Chapter 12 Quiz</h1>
      <p class="sub">Multiple choice practice with shuffled questions each time.</p>
    </section>

    <section class="stats" aria-label="Quiz stats">
      <div class="stat"><div class="label">Progress</div><div class="value" id="progressValue">1 / 16</div></div>
      <div class="stat"><div class="label">Score</div><div class="value" id="scoreValue">0</div></div>
      <div class="stat"><div class="label">Correct</div><div class="value" id="correctValue">0</div></div>
    </section>

    <section class="quiz-card">
      <div id="quizArea">
        <div class="question-type" id="questionType">Root → Meaning</div>
        <h2 class="question" id="questionText"></h2>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback"></div>
        <div class="next-row">
          <button class="next-btn" id="nextBtn" type="button" hidden>Next</button>
        </div>
      </div>
      <div class="done" id="doneArea" hidden>
        <h2>Nice work! 🎉</h2>
        <p id="doneText"></p>
        <button class="restart-btn" id="restartBtn" type="button">Play Again</button>
      </div>
    </section>
  </main>

  <script>
    const roots = [
      {
        root: 'phon', emoji: '🔊', meaning: 'sound',
        example: 'microphone', exampleDef: 'makes sound louder',
        example2: 'telephone', example2Def: 'sound from far away'
      },
      {
        root: 'photo', emoji: '📸', meaning: 'light',
        example: 'photograph', exampleDef: 'picture made with light',
        example2: 'photosynthesis', example2Def: 'plants use light to make food'
      },
      {
        root: 'plat / plan', emoji: '📏', meaning: 'flat',
        example: 'plateau', exampleDef: 'flat land high up',
        example2: 'plane', example2Def: 'flat surface'
      },
      {
        root: 'plasm', emoji: '🧬', meaning: 'forming substance',
        example: 'cytoplasm', exampleDef: 'jelly inside a cell',
        example2: 'plasma', example2Def: 'part of blood'
      },
      {
        root: 'pneu / pneum', emoji: '🌬️', meaning: 'air, breath',
        example: 'pneumonia', exampleDef: 'sickness in the lungs',
        example2: 'pneumatic', example2Def: 'powered by air'
      },
      {
        root: 'ped (Latin)', emoji: '🦶', meaning: 'foot',
        example: 'pedal', exampleDef: 'something you push with your foot',
        example2: 'pedestrian', example2Def: 'person walking'
      },
      {
        root: 'pod (Greek)', emoji: '🐙', meaning: 'foot',
        example: 'tripod', exampleDef: 'three-footed stand',
        example2: 'octopus', example2Def: 'animal with eight feet'
      },
      {
        root: 'ped (Greek)', emoji: '👶', meaning: 'child',
        example: 'pediatrician', exampleDef: 'doctor for kids',
        example2: 'pedagogy', example2Def: 'teaching children'
      }
    ];

    // Distractor pool — wrong meanings for wrong-answer choices
    // We pair roots carefully so that the two "foot" roots and two "ped" roots
    // don't accidentally serve as wrong answers for each other in a confusing way.
    function getWrongMeanings(correctItem, count) {
      const pool = roots.filter(r => r.meaning !== correctItem.meaning || r.root !== correctItem.root);
      shuffle(pool);
      // Deduplicate meanings in the wrong set
      const seen = new Set();
      const result = [];
      for (const r of pool) {
        if (!seen.has(r.meaning) && result.length < count) {
          seen.add(r.meaning);
          result.push(r);
        }
      }
      return result;
    }

    function getWrongRoots(correctItem, count) {
      const pool = roots.filter(r => r.root !== correctItem.root);
      shuffle(pool);
      const seen = new Set();
      const result = [];
      for (const r of pool) {
        if (!seen.has(r.root) && result.length < count) {
          seen.add(r.root);
          result.push(r);
        }
      }
      return result;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Build exactly 2 questions per root (16 total), alternating question types.
    // Type A: Root → Meaning
    // Type B: Example word → Root meaning
    function buildQuestions() {
      const list = [];

      roots.forEach((item, idx) => {
        // Question type alternates: even index → Root→Meaning, odd → Example→Meaning
        // But we always do BOTH types per root, so each root gets one of each.

        // --- Type A: Root → Meaning ---
        const wrongsA = getWrongMeanings(item, 3).map(x => `${x.emoji} ${x.meaning}`);
        const correctA = `${item.emoji} ${item.meaning}`;
        list.push({
          type: 'Root → Meaning',
          prompt: `What does ${item.emoji} <strong>${item.root}</strong> mean?`,
          choices: shuffle([correctA, ...wrongsA]),
          answer: correctA,
          okText: `${item.root} means "${item.meaning}."`
        });

        // --- Type B: Example word → Root meaning ---
        // Alternate which example word we use: even roots use example, odd use example2
        const useEx2 = idx % 2 === 1;
        const word = useEx2 ? item.example2 : item.example;
        const wrongsB = getWrongMeanings(item, 3).map(x => `${x.emoji} ${x.meaning}`);
        const correctB = `${item.emoji} ${item.meaning}`;
        list.push({
          type: 'Example Word → Root Meaning',
          prompt: `In the word <strong>${word}</strong>, what does the root mean?`,
          choices: shuffle([correctB, ...wrongsB]),
          answer: correctB,
          okText: `"${word}" uses the root ${item.root}, which means "${item.meaning}."`
        });
      });

      // Shuffle the full list and return all 16
      return shuffle(list);
    }

    // --- DOM refs ---
    const questionTypeEl = document.getElementById('questionType');
    const questionTextEl = document.getElementById('questionText');
    const answersEl = document.getElementById('answers');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const progressValue = document.getElementById('progressValue');
    const scoreValue = document.getElementById('scoreValue');
    const correctValue = document.getElementById('correctValue');
    const quizArea = document.getElementById('quizArea');
    const doneArea = document.getElementById('doneArea');
    const doneText = document.getElementById('doneText');
    const restartBtn = document.getElementById('restartBtn');

    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let correctCount = 0;
    let locked = false;

    function updateStats() {
      progressValue.textContent = `${Math.min(currentIndex + 1, questions.length)} / ${questions.length}`;
      scoreValue.textContent = score;
      correctValue.textContent = correctCount;
    }

    function renderQuestion() {
      locked = false;
      nextBtn.hidden = true;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';

      const q = questions[currentIndex];
      questionTypeEl.textContent = q.type;
      questionTextEl.innerHTML = q.prompt;
      answersEl.innerHTML = '';

      q.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.type = 'button';
        btn.textContent = choice;
        btn.addEventListener('click', () => checkAnswer(btn, q));
        answersEl.appendChild(btn);
      });

      updateStats();
    }

    function checkAnswer(btn, q) {
      if (locked) return;
      locked = true;

      const buttons = [...answersEl.querySelectorAll('.answer-btn')];
      buttons.forEach(b => b.disabled = true);

      if (btn.textContent === q.answer) {
        btn.classList.add('correct');
        score += 1;
        correctCount += 1;
        feedbackEl.textContent = `✅ Correct! ${q.okText}`;
        feedbackEl.className = 'feedback good';
      } else {
        btn.classList.add('wrong');
        const correctBtn = buttons.find(b => b.textContent === q.answer);
        if (correctBtn) correctBtn.classList.add('correct');
        feedbackEl.textContent = `Not quite. ${q.okText}`;
        feedbackEl.className = 'feedback bad';
      }

      updateStats();
      nextBtn.hidden = false;
    }

    function showDone() {
      quizArea.hidden = true;
      doneArea.hidden = false;
      progressValue.textContent = `${questions.length} / ${questions.length}`;
      const pct = Math.round((score / questions.length) * 100);
      let msg = '';
      if (pct === 100) msg = 'Perfect score! You crushed it! 🌟';
      else if (pct >= 80) msg = 'Great job! Almost perfect!';
      else if (pct >= 60) msg = 'Good effort! Keep practicing!';
      else msg = 'Keep studying — you\'ve got this!';
      doneText.textContent = `You got ${score} out of ${questions.length} correct. ${msg}`;
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= questions.length) {
        showDone();
      } else {
        renderQuestion();
      }
    }

    function startQuiz() {
      questions = buildQuestions();
      currentIndex = 0;
      score = 0;
      correctCount = 0;
      quizArea.hidden = false;
      doneArea.hidden = true;
      renderQuestion();
    }

    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', startQuiz);

    startQuiz();
  </script>
</body>
</html>
